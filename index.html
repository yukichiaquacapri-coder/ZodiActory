<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Calculator</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); text-align: center; padding: 40px 20px; }
        .container { background: var(--card); padding: 30px; border-radius: 20px; display: inline-block; max-width: 400px; width: 100%; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        h1 { color: var(--accent); }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 0.8em; color: #94a3b8; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .geo { display: flex; gap: 10px; }
        button { width: 100%; padding: 12px; margin-top: 10px; background: var(--accent); color: #0f172a; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #result { margin-top: 30px; padding: 20px; background: rgba(56,189,248,0.1); border-radius: 12px; text-align: left; line-height: 2; }
    </style>
</head>
<body>
    <h1>宇宙計算機</h1>
    <div class="container">
        <div class="input-group"><label>生年月日</label><input type="date" id="date" value="1993-01-22"></div>
        <div class="input-group"><label>出生時刻</label><input type="time" id="time" value="09:06"></div>
        <div class="input-group"><label>緯度・経度</label>
            <div class="geo">
                <input type="number" id="lat" placeholder="緯度" step="0.01" value="43.06">
                <input type="number" id="lng" placeholder="経度" step="0.01" value="141.35">
            </div>
        </div>
        <button onclick="calculate()">ネイタルチャートを計算</button>
        <div id="result">ここに結果が表示されます</div>
    </div>
<script>
        async function calculate() {
            const date = document.getElementById('date').value;
            const time = document.getElementById('time').value;
            const lat = document.getElementById('lat').value;
            const lng = document.getElementById('lng').value;
            const resDiv = document.getElementById('result');
            resDiv.innerText = "星の位置を計算中...";
            try {
                const response = await fetch(`/api/horoscope?date=${date}&time=${time}&lat=${lat}&lng=${lng}`);
                const data = await response.json();
                
                // ここを修正：裏側のプログラムが返す名前に合わせます
                if (data.error) {
                    resDiv.innerText = "エラー: " + data.error;
                } else {
                    resDiv.innerHTML = `☀️ 太陽: <strong>${data.sun}</strong><br>🌙 月: <strong>${data.moon}</strong><br>⬆️ ASC: <strong>${data.asc}</strong>`;
                }
            } catch (e) { 
                resDiv.innerText = "計算失敗。通信環境などを確認してね！"; 
            }
        }
    </script>
</body>
</html>
