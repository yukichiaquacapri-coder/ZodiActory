<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Natal Chart</title>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: white; text-align: center; padding: 20px; }
        .container { background: #16213e; padding: 20px; border-radius: 15px; display: inline-block; }
        input { padding: 8px; margin: 5px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #e94560; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #result { margin-top: 20px; font-size: 1.2em; line-height: 1.6; }
    </style>
</head>
<body>
    <h1>ホロスコープ計算機</h1>
    <div class="container">
        <p>生年月日と時間を入力してください</p>
        <input type="date" id="birthDate" value="1993-01-21"><br>
        <input type="time" id="birthTime" value="12:00"><br>
        <button onclick="calculate()">計算する</button>

        <div id="result">ここに結果が表示されます</div>
    </div>

    <script>
        async function calculate() {
            const date = document.getElementById('birthDate').value;
            const time = document.getElementById('birthTime').value;
            const resultDiv = document.getElementById('result');

            resultDiv.innerText = "計算中...";

            try {
                // URLに誕生日データをくっつけてAPIに送る
                const response = await fetch(`/api/horoscope?date=${date}&time=${time}`);
                const data = await response.json();

                resultDiv.innerHTML = `
                    太陽: ${data.sun}<br>
                    月: ${data.moon}<br>
                    アセンダント: ${data.asc}
                `;
            } catch (error) {
                resultDiv.innerText = "エラーが発生しました";
            }
        }
    </script>
</body>
</html>
